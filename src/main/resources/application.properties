# -- Server ----------------------
server.port=8080
# -- Database (H2 for dev - swap datasource block for MySQL in production) -
spring.datasource.url=jdbc:h2:mem:hwscsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# -- JPA -----------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# -- JWT ------------------------
# Replace secret with a strong random value in production (min 32 chars)
jwt.secret=rugywrgnyanvndfsdpwayukobxfwjhhrsmfgdnyddmxnwkrzynsghfjgkzzzqrcndoguaxquduwwhpnsulzyxeyfyxdewojajjlzmtuhiijnebrgjflyltyuxpaxtiivslzghhmpiwcvwvfllrycndeqxsmsivoa
jwt.expiration-ms=86400000
