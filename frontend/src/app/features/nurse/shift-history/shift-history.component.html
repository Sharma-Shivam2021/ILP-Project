<div class="dashboard-container">
  <div class="header-section">
    <h1>Shift History</h1>
  </div>

  <mat-card class="dashboard-card">
    <mat-card-content>
      <table mat-table [dataSource]="pastShifts" class="mat-elevation-z0" *ngIf="pastShifts.length > 0; else noShifts">
        
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let shift"> {{ shift.shiftDate | date:'mediumDate' }} </td>
        </ng-container>

        <ng-container matColumnDef="shift">
          <th mat-header-cell *matHeaderCellDef> Shift </th>
          <td mat-cell *matCellDef="let shift"> 
            <span class="shift-badge" [ngClass]="shift.shiftName.toUpperCase()">
              {{ shift.shiftName }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="time">
          <th mat-header-cell *matHeaderCellDef> Time </th>
          <td mat-cell *matCellDef="let shift"> {{ shift.startTime }} - {{ shift.endTime }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let shift">
            <span class="status-text" [class.swapped]="shift.isSwapped">
              {{ shift.isSwapped ? 'Swapped' : 'Completed' }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      
      <ng-template #noShifts>
        <div class="empty-state">
          <mat-icon>history</mat-icon>
          <p>No shift history available.</p>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
