<div class="dashboard-container">
  <div class="header-section">
    <h1>Assigned Shifts (Weekly View)</h1>
  </div>

  <mat-card class="dashboard-card">
    <mat-card-content>
      <table mat-table [dataSource]="upcomingShifts" class="mat-elevation-z0" *ngIf="upcomingShifts.length > 0; else noShifts">
        
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let shift"> {{ shift.shiftDate | date:'mediumDate' }} </td>
        </ng-container>

        <ng-container matColumnDef="shift">
          <th mat-header-cell *matHeaderCellDef> Shift </th>
          <td mat-cell *matCellDef="let shift"> 
            <span class="shift-badge" [ngClass]="shift.shiftName.toUpperCase()">
              {{ shift.shiftName }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef> Time </th>
          <td mat-cell *matCellDef="let shift"> {{ shift.startTime }} - {{ shift.endTime }} </td>
        </ng-container>

        <ng-container matColumnDef="swapAvailable">
          <th mat-header-cell *matHeaderCellDef> Swap Available </th>
          <td mat-cell *matCellDef="let shift">
            <span class="swap-status" [class.yes]="!shift.isSwapped" [class.no]="shift.isSwapped">
              {{ !shift.isSwapped ? 'Yes' : 'No' }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      
      <ng-template #noShifts>
        <div class="empty-state">
          <mat-icon>event_busy</mat-icon>
          <p>No more shifts beyond selected range.</p>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
